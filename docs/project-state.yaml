  updated: '2026-05-14'
workflow:
  sdd:
    state_machine:
    - name: CLARIFY
      description: 需求澄清 — 理解问题、确认范围、out_of_scope
    - name: RESEARCH
      description: 深度调研 — sdd-research 结构化调研、交叉验证
    - name: SPEC_CREATE
      description: Spec 文档创作 — 编写 Spec、技术方案
    - name: SPEC_REVIEW
      description: 🔔 Spec 主人审阅 — 自动送审主人，等待批准
    - name: STORY_CREATE
      description: Story 文档创作 — 编写 Story、验收标准
    - name: STORY_REVIEW
      description: 🔔 Story 主人审阅 — 自动送审主人，等待批准
    - name: QA_GATE
      description: 质量门禁 — 结构检查 P0 + 内容检查 P1 + 体系检查 P2
    - name: REVIEW
      description: 主人审阅 — 提交后等待主人批准或驳回
    - name: APPROVED
      description: 已批准 — 可以进入 ARCHITECT 阶段
    - name: ARCHITECT
      description: 架构设计 — ADR、数据模型、API 契约、文件变更范围
    - name: PLAN
      description: 实现计划 — 原子任务分解、依赖标注
    - name: IMPLEMENT
      description: 技术实现 — TDD RED-GREEN-REFACTOR
    - name: COMPLETED
      description: 完成 — 测试通过、AC 验证通过、doc-alignment 完成
    - name: ARCHIVED
      description: 已归档 — 漂移=0，HTML 已生成
    transitions:
    - from: (none)
      to: draft
      gate: create
    - from: draft
      to: review
      gate: submit
      checks:
      - file_exists
      - fields_complete
    - from: review
      to: approved
      gate: approve
      checks:
      - owner_approved
    - from: review
      to: draft
      gate: reject
      checks:
      - reason_recorded
    - from: research
      to: spec_create
      gate: spec_write
      checks:
      - research_complete
    - from: spec_create
      to: spec_review
      gate: spec_submit
      checks:
      - file_exists
      - fields_complete
    - from: spec_review
      to: story_create
      gate: spec_approve
      checks:
      - owner_approved
    - from: spec_review
      to: research
      gate: spec_reject
      checks:
      - reason_recorded
    - from: story_create
      to: story_review
      gate: story_submit
      checks:
      - file_exists
      - fields_complete
    - from: story_review
      to: approved
      gate: story_approve
      checks:
      - owner_approved
    - from: story_review
      to: spec_create
      gate: story_reject
      checks:
      - reason_recorded
    - from: story_review
      to: qa_gate
      gate: story_approved_proceed
      checks:
      - owner_approved
    - from: approved
      to: architect
      gate: architect_start
      checks:
      - adr_recorded
    - from: architect
      to: plan
      gate: plan_start
      checks:
      - plan_file_exists
    - from: plan
      to: implement
      gate: implement_start
      checks:
      - tasks_defined
    - from: implement
      to: completed
      gate: complete
      checks:
      - pytest_passes
      - ac_verified
      - doc_alignment_done
    - from: completed
      to: archived
      gate: archive
      checks:
      - drift_zero
      - html_generated
  development:
    state_machine:
    - name: REQ_CLARIFY
      description: 需求确认 — 理解要做什么
    - name: REALITY_CHECK
      description: 环境基线 — git log, test baseline, version
    - name: PLAN
      description: 实施计划 — writing-plans 任务分解
    - name: TDD_RED
      description: 写失败测试
    - name: TDD_GREEN
      description: 写最少代码让测试通过
    - name: TDD_REFACTOR
      description: 重构 + 确认测试仍通过
    - name: VERIFY
      description: 全量测试验证
    - name: SELF_REVIEW
      description: self-review 自我审查
    - name: COMMIT
      description: git commit + doc-alignment
  qa:
    state_machine:
    - name: L0_SYNTAX
      description: P0 语法检查 — Python syntax + YAML valid
    - name: L1_UNIT
      description: P1 单元测试 — pytest 单模块
    - name: L2_INTEGRATION
      description: P2 集成测试 — pytest 全量
    - name: L3_GATE
      description: P3 门禁检查 — naming + cross-ref + quality
    - name: L4_REPORT
      description: P4 报告生成 — HTML 报告 + 健康仪表盘
  startup:
    state_machine:
    - name: P0_SKELETON
      description: 项目骨架 — 目录、README、.gitignore、constraints
    - name: P1_VERSION
      description: 版本管理 — pyproject.toml、bump-version.py、CHANGELOG
    - name: P2_CI
      description: CI/CD 管道 — GitHub Actions、语法检查、本地预测试
    - name: P3_DOC_ALIGN
      description: 文档对齐 — 版本三处一致、数字与实际一致
    - name: P4_GATES
      description: 质量门禁 — pre-push.sh、安全红线、版本一致
  gates:
    pre_flight:
      description: 通用守门员 — 学习状态 + SDD 门禁 + 技能检测
      script: ~/.hermes/scripts/pre_flight.py
      severity: blocking
    naming:
      description: 命名规范门禁 — 文档命名合规
      script: python3 ~/.hermes/skills/sdd-workflow/scripts/validate-sdd-naming.py
      severity: blocking
    tests:
      description: 测试门禁 — 全量测试通过
      script: python3 -m pytest tests/ -q
      severity: blocking
    cross_ref:
      description: 交叉引用门禁 — 引用完整性
      script: python3 scripts/ci-check-cross-refs.py
      severity: warning
    state_sync:
      description: 状态同步门禁 — project-state.yaml 与实际文档一致
      script: python3 scripts/project-state.py verify
      severity: blocking
