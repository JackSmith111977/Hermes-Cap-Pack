# Workflow Chain Protocol v2.0
# 统一状态机：SDD → DEV → QA → COMMIT 自动链式衔接
# 由 scripts/workflow-chain.py 实际执行
# 本文件为人类可读的配置声明，与 workflow-chain.py 同步

name: workflow-chain
version: 2.0.0
description: >
  工作流链衔接协议 v2.0 — 统一状态机管理 SDD→DEV→QA→COMMIT。
  v2.0 改进：
  1. 自动注册 — 无需手动创建 chain-state.json
  2. 泛化门禁 — 自动检测项目类型，选择合适 gate
  3. skill 提示 — advance 后自动输出 skill_view() 指令
  4. 独立脚本 — scripts/workflow-chain.py 取代旧 chain-state.py + chain-gate.py

stages:
  - id: SPEC
    title: Spec 完成
    description: 需求→Spec→Story 批准
    entry_skill: sdd-workflow
    next: DEV

  - id: DEV
    title: 开发实施
    description: 7 步开发流程 (TDD)
    entry_skill: generic-dev-workflow
    next: QA

  - id: QA
    title: 质量门禁
    description: L0-L4 分层门禁
    entry_skill: generic-qa-workflow
    next: COMMIT

  - id: COMMIT
    title: 提交对齐
    description: 文档对齐 + 提交
    entry_skill: commit-quality-check
    next: null  # 最终阶段

gates:
  SPEC:
    description: "检查 EPIC Stories 是否完整"
    check: "project-state.yaml epics[].completed_count == story_count"
  
  DEV:
    description: "检查测试是否全部通过"
    check: "pytest tests/ -q 全绿"
  
  QA:
    description: "检查项目状态一致性"
    check: "project-state.py verify"
  
  COMMIT:
    description: "检查是否有未提交变更"
    check: "git status --short"

# 使用方式:
#   python3 scripts/workflow-chain.py init EPIC-005     # 初始化
#   python3 scripts/workflow-chain.py advance EPIC-005   # 推进
#   python3 scripts/workflow-chain.py status EPIC-005    # 查看
#   python3 scripts/workflow-chain.py list               # 列表
