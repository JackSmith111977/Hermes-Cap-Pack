# 🗂️ CAP Pack 18 模块分类映射表
#
# 供 SRA (Skill Runtime Advisor) 加载的类别映射配置。
# 将 CAP Pack 的 18 模块分类体系映射为 SRA 可消费的格式。
#
# 使用方式:
#   SRA 加载此文件后，类别维度（15%权重）不再靠猜标签，
#   而是直接使用经过验证的 18 模块分层分类。
#
# 扩展说明:
#   新增模块时，在此文件添加新条目 + 在 CAP_PACK_DIR/packs/ 下创建对应目录。
# 
# 版本: 1.0.0
# 创建: 2026-05-14
# 维护: boku (Emma)

