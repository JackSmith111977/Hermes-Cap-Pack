# 扩展指南
# ─────────────────────────────────────────────────────
# 新增模块步骤:
# 1. 在此文件添加新的 categories.<id> 条目
# 2. 在 CAP_PACK_DIR/packs/ 下创建对应能力包目录
# 3. 在 skill-tree-index.py 的 MODULES dict 中添加映射
# 4. 在 CLASSIFICATION_RULES 列表中添加分类规则
# 5. 同步更新 docs/project-report.json 的 architecture 部分
#
# SRA 集成说明:
# ─────────────────────────────────────────────────────
# SRA 加载此文件后:
#   1. 类别维度从「猜标签」升级为「体系化分类」
#   2. 类别匹配精度预计提升 15-20%
#   3. 使用 `sra index --rebuild` 刷新索引
#   4. 或在 SRA 配置中设置:
#      categories_file: ~/projects/hermes-cap-pack/packs/categories/cap-pack-categories.yaml
