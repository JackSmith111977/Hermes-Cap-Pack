## 技能 (10 个原子技能，重组后)

skills:
  # ─── PDF 簇 (合并后 2 个) ───
  - id: pdf-layout
    name: PDF 排版与生成
    description: "专业 PDF 排版设计与生成 — 合并原 pdf-layout + pdf-layout-reportlab + pdf-layout-weasyprint。涵盖 ReportLab 和 WeasyPrint 双引擎、中文 CJK 字体方案、智能分页、表格/图片/图表嵌入"
    version: 3.0.0
    tags: [pdf, layout, reportlab, weasyprint, 排版, 中文PDF]
    cluster: pdf
    sqs_target: 78.0

  - id: pdf-pro-design
    name: 高级 PDF 设计
    description: "高级 PDF 排版设计指南 — 跨场景排版规范、CRAP 原则、商业文档模板、视觉层次"
    version: 2.0.0
    tags: [pdf, design, 排版设计, 高级排版]
    cluster: pdf
    sqs_target: 80.0

  # ─── 渲染对比 (独立) ───
  - id: pdf-render-comparison
    name: PDF 渲染对比
    description: "PDF 渲染工具选型决策树 — WeasyPrint/ReportLab/Chrome/chromium 对比"
    version: 1.0.0
    tags: [pdf, 选型, 对比, 渲染]
    cluster: pdf
    sqs_target: 85.0

  # ─── HTML 簇 ───
  - id: html-presentation
    name: HTML 演示文稿
    description: "用 HTML/CSS 制作演示文稿 — reveal.js/Slidev/Marp 四大方案"
    version: 2.1.0
    tags: [html, 演示文稿, presentation, reveal.js]
    cluster: html
    sqs_target: 80.0

  # ─── PPTX 簇 ───
  - id: pptx-guide
    name: PPTX 操作指南
    description: "PowerPoint (.pptx) 操作 — python-pptx 创建专业 PPT"
    version: 1.0.0
    tags: [pptx, 演示文稿, powerpoint]
    cluster: pptx
    sqs_target: 72.0

  # ─── 视觉 QA 簇 ───
  - id: vision-qc-patterns
    name: 排版质量检查
    description: "PDF 排版错误模式库 — 粘连/错位/截断/字体回退 视觉检测"
    version: 1.0.0
    tags: [vision, qc, 排版, 质量检测]
    cluster: vision
    sqs_target: 80.0

  # ─── 路由/索引簇 ───
  - id: doc-design
    name: 文档排版路由
    description: "文档排版设计索引 — 根据格式路由到原子 skill"
    version: 5.1.0
    tags: [文档, 排版, doc, 路由]
    cluster: router
    sqs_target: 78.0

  # ─── 其他 ───
  - id: nano-pdf
    name: Nano PDF 编辑
    description: "自然语言 PDF 编辑 — nano-pdf CLI"
    version: 1.0.0
    tags: [pdf, 编辑, nano]
    cluster: edit
    sqs_target: 70.0

  - id: readme-for-ai
    name: AI 友好 README
    description: "编写模型友好型 README — 让 AI Agent 自主完成安装配置"
    version: 1.1.0
    tags: [readme, 文档, agent]
    cluster: meta
    sqs_target: 75.0

