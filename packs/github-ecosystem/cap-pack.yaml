  path: SKILLS/github-project-ops/SKILL.md
  version: 1.0.0
  tags:
  - github
  - project
  - ops
  - maintenance
  - ci
  sqs_target: 80.0
  compatibility:
    agent_types:
    - opencode
    - openclaw
