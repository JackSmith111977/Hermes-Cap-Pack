## Skill 列表

skills:
  - id: learning-workflow
    name: 学习工作流 v5.x
    description: >
      所有学习/研究任务的强制流程拦截器。状态机+文件标志物防跳过机制。
      支持 CLARIFY → RESEARCH → SYNTHESIZE → QA_GATE → REVIEW → INTEGRATE
      六阶段循环，含 regress/reject/loop-status 命令。
    source: SKILLS/learning-workflow/SKILL.md
    version: 5.5.0
    tags: [learning, research, study, workflow, state-machine, reflection]

## 脚本

scripts:
  - id: learning-state
    name: 学习状态机
    description: "六阶段学习状态机管理（init/explore/deepen/synthesize/review/integrate + regress/reject）"
    source: SKILLS/learning-workflow/scripts/learning-state.py
    tags: [state-machine, learning]

  - id: reflection-gate
    name: 反思门禁
    description: "R1/R2/R3 三层反思门禁 + Quality Gate 自动化检查"
    source: SKILLS/learning-workflow/scripts/reflection-gate.py
    tags: [reflection, quality-gate]

  - id: skill-finder
    name: 技能发现引擎
    description: "语义匹配技能推荐（v2 支持向量召回 + 混合排序）"
    source: SKILLS/learning-workflow/scripts/skill_finder.py
    tags: [skill-discovery, recommendation]

## 依赖

depends_on: {}

## 配置

config:
  learning_state_db: "~/.hermes/data/learning_state.json"
  reflection_threshold:
    r1_min_score: 0.6  # 理解层最低分
    r2_min_score: 0.7  # 关联层最低分
    r3_min_score: 0.8  # 批判层最低分
  max_loop_depth: 5    # 最大循环深度

## 安装

install:
  scripts:
    - source: SKILLS/learning-workflow/scripts/learning-state.py
      target: ~/.hermes/scripts/learning-state.py
    - source: SKILLS/learning-workflow/scripts/reflection-gate.py
      target: ~/.hermes/scripts/reflection-gate.py
    - source: SKILLS/learning-workflow/scripts/skill_finder.py
      target: ~/.hermes/scripts/skill_finder.py
    - source: SKILLS/learning-workflow/scripts/skill_finder_v2.py
      target: ~/.hermes/scripts/skill_finder_v2.py
  skills:
    - source: SKILLS/learning-workflow/SKILL.md
      target: ~/.hermes/skills/dogfood/learning-workflow/SKILL.md
  references:
    - source: SKILLS/learning-workflow/references/
      target: ~/.hermes/skills/dogfood/learning-workflow/references/
  post_install:
    - "chmod +x ~/.hermes/scripts/learning-state.py"
    - "chmod +x ~/.hermes/scripts/reflection-gate.py"
    - "chmod +x ~/.hermes/scripts/skill_finder.py"
    - "chmod +x ~/.hermes/scripts/skill_finder_v2.py"

## 经验

experiences:
  - id: learning-loop-common-pitfalls
    title: 学习循环常见陷阱
    content: |
      1. 跳过 CLARIFY 直接进入 RESEARCH → 导致方向偏移，浪费循环深度
      2. 反思门禁 R3（批判层）经常被跳过 → 需 reflection-gate.py enforce 强制检查
      3. 循环深度超过 5 轮后收益递减 → 用 `--max-depth 5` 限制
      4. learning-state.json 在 context compaction 后可能状态丢失 → 用 `get_state` 恢复
      5. 子代理裁判模式不自带 context → 需手动注入父级学习上下文

  - id: skill-finder-tuning
    title: 技能发现引擎调优
    content: |
      1. v2 版本使用向量召回 + TF-IDF 混合排序，精度比 v1 高 ~30%
      2. 阈值 ≥ 30 才加载 skill，避免低匹配度噪音
      3. 匹配分低于 15 时 fallback 到 web_search
      4. 需要定期重建索引（skill_finder_v2.py --reindex）

  - id: cycle-design-principles
    title: 学习循环设计原则
    content: |
      1. 广度优先（第一轮）→ 深度优先（第二轮）→ 精炼回归（第三轮）
      2. 每轮结束时必须过 Quality Gate（reflection-gate.py check）
      3. 每轮产出必须可追溯（状态机自动记录到 learning_state.json）
      4. 新信息新证据应触发 regress 返回上一阶段，而非在当前阶段打补丁
